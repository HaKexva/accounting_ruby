name: CI

on:
  pull_request:
  push:
    branches: [ main ]

# Opt JavaScript-based actions (e.g. actions/cache) into Node.js 24 before the runner default flip.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan_ruby:
    runs-on: ubuntu-latest
    container:
      image: ruby:3.4.8-bookworm

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install gems
        uses: ./.github/actions/bundle-install

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  scan_js:
    runs-on: ubuntu-latest
    container:
      image: ruby:3.4.8-bookworm

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install gems
        uses: ./.github/actions/bundle-install

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    container:
      image: ruby:3.4.8-bookworm
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install gems
        uses: ./.github/actions/bundle-install

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest
    container:
      image: ruby:3.4.8-bookworm

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install packages
        run: apt-get update && apt-get install --no-install-recommends -y libvips-dev

      - name: Install gems
        uses: ./.github/actions/bundle-install

      - name: Run tests
        env:
          RAILS_ENV: test
        run: bin/rails db:test:prepare test

  system-test:
    runs-on: ubuntu-latest
    container:
      image: ruby:3.4.8-bookworm

    steps:
      - name: Install packages
        run: |
          apt-get update
          apt-get install --no-install-recommends -y libvips-dev chromium chromium-driver

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install gems
        uses: ./.github/actions/bundle-install

      - name: Skip if no system tests exist
        if: ${{ hashFiles('test/system/**/*_test.rb') == '' }}
        run: echo "No system tests found under test/system/**/*_test.rb; skipping."

      - name: Run System Tests
        if: ${{ hashFiles('test/system/**/*_test.rb') != '' }}
        env:
          RAILS_ENV: test
          CHROME_BIN: /usr/bin/chromium
          CHROMEDRIVER_PATH: /usr/bin/chromedriver
        run: bin/rails db:test:prepare test:system

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore
